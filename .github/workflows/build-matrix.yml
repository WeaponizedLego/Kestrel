name: Build Matrix

# Cross-compiles Kestrel on every PR and every push to main. The
# matrix mirrors the platforms in docs/system-design.md → "Cross-
# compile matrix". CGO is forced off to catch any dependency that
# accidentally pulls in a C compiler (the code is supposed to stay
# pure Go so cross-compilation from any host is clean).

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    env:
      CGO_ENABLED: 0
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build frontend
        working-directory: frontend
        env:
          # vue-tsc and tsx run on the host — don't let the cross-
          # compilation env leak into their own toolchain.
          CGO_ENABLED: 1
          GOOS:
          GOARCH:
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Vet
        # vet only needs to run once, but running per-target catches
        # any build-tag-gated file that breaks on a specific GOOS.
        run: go vet ./...

      - name: Build binary
        run: |
          mkdir -p dist
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -trimpath -ldflags="-s -w" \
            -o "dist/kestrel-${{ matrix.goos }}-${{ matrix.goarch }}${ext}" \
            ./cmd/kestrel

      - name: Package AppImage
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: |
          icon_arg=()
          if [ -f assets/icon/icon.png ]; then icon_arg=(--icon assets/icon/icon.png); fi
          ./scripts/package-linux.sh "dist/kestrel-linux-amd64" dist "${icon_arg[@]}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kestrel-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/kestrel-${{ matrix.goos }}-${{ matrix.goarch }}*
            dist/Kestrel-x86_64.AppImage
          if-no-files-found: error
          retention-days: 14

  package-macos:
    name: Package macOS .app (arm64)
    runs-on: macos-latest
    env:
      CGO_ENABLED: 0
      GOOS: darwin
      GOARCH: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build frontend
        working-directory: frontend
        env:
          CGO_ENABLED: 1
          GOOS:
          GOARCH:
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Build binary
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" \
            -o "dist/kestrel" \
            ./cmd/kestrel

      - name: Package .app
        run: |
          icon_arg=()
          if [ -f assets/icon/icon.png ]; then icon_arg=(--icon assets/icon/icon.png); fi
          ./scripts/package-macos.sh dist/kestrel dist "${icon_arg[@]}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kestrel-macos-arm64-app
          path: dist/Kestrel-macos-arm64.zip
          if-no-files-found: error
          retention-days: 14

  test:
    name: Test (linux/amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race ./...
