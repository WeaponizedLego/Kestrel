name: Reusable vision build

# Reusable workflow that cross-compiles the optional kestrel-vision
# sidecar for every supported target. Called by vision-build.yml on
# PRs touching the sidecar, and by release.yml on tag pushes.
#
# Today the sidecar is pure Go (scaffold — see cmd/kestrel-vision/),
# so CGO_ENABLED=0 builds cleanly from a single Linux runner. When
# the ONNX Runtime integration lands this workflow is the one that
# changes: switch to a native per-target matrix, flip CGO_ENABLED=1,
# fetch model weights with SHA-256 verification, and ship the runtime
# shared libraries alongside the binary.

on:
  workflow_call:
    inputs:
      retention-days:
        description: How long to keep uploaded artifacts.
        required: false
        type: number
        default: 14

jobs:
  build:
    name: vision ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    env:
      CGO_ENABLED: 0
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Fetch ONNX model weights
        # Downloads SCRFD, ArcFace, YOLOv8n into
        # cmd/kestrel-vision/model/models/ where //go:embed picks
        # them up during `go build`. The script takes URLs from env
        # vars because "the right mirror" drifts — pin them in repo
        # secrets so workflow YAML never carries a URL that might
        # 404. Fills in via GitHub Actions secrets:
        #   KESTREL_SCRFD_URL    → InsightFace buffalo_m det_2.5g.onnx
        #   KESTREL_ARCFACE_URL  → InsightFace antelopev2 glintr100.onnx
        #   KESTREL_YOLO_URL     → yolov8n.onnx (Ultralytics export)
        # Script is idempotent — a restored cache is a no-op.
        env:
          KESTREL_SCRFD_URL: ${{ secrets.KESTREL_SCRFD_URL }}
          KESTREL_ARCFACE_URL: ${{ secrets.KESTREL_ARCFACE_URL }}
          KESTREL_YOLO_URL: ${{ secrets.KESTREL_YOLO_URL }}
        run: ./scripts/fetch-vision-models.sh

      - name: Vet sidecar
        run: go vet ./cmd/kestrel-vision/... ./internal/vision/...

      - name: Build sidecar
        run: |
          mkdir -p dist
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -trimpath -ldflags="-s -w" \
            -o "dist/kestrel-vision-${{ matrix.goos }}-${{ matrix.goarch }}${ext}" \
            ./cmd/kestrel-vision

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kestrel-vision-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/kestrel-vision-${{ matrix.goos }}-${{ matrix.goarch }}*
          if-no-files-found: error
          retention-days: ${{ inputs.retention-days }}
