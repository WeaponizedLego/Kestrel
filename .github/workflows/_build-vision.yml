name: Reusable vision build

# Reusable workflow that cross-compiles the optional kestrel-vision
# sidecar for every supported target. Called by vision-build.yml on
# PRs touching the sidecar, and by release.yml on tag pushes.
#
# Today the sidecar is pure Go (scaffold — see cmd/kestrel-vision/),
# so CGO_ENABLED=0 builds cleanly from a single Linux runner. When
# the ONNX Runtime integration lands this workflow is the one that
# changes: switch to a native per-target matrix, flip CGO_ENABLED=1,
# fetch model weights with SHA-256 verification, and ship the runtime
# shared libraries alongside the binary.

on:
  workflow_call:
    inputs:
      retention-days:
        description: How long to keep uploaded artifacts.
        required: false
        type: number
        default: 14

jobs:
  build:
    name: vision ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    env:
      CGO_ENABLED: 0
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet sidecar
        run: go vet ./cmd/kestrel-vision/... ./internal/vision/...

      - name: Build sidecar
        run: |
          mkdir -p dist
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -trimpath -ldflags="-s -w" \
            -o "dist/kestrel-vision-${{ matrix.goos }}-${{ matrix.goarch }}${ext}" \
            ./cmd/kestrel-vision

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kestrel-vision-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/kestrel-vision-${{ matrix.goos }}-${{ matrix.goarch }}*
          if-no-files-found: error
          retention-days: ${{ inputs.retention-days }}
